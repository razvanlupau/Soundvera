<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundvera - Contact</title>
<link rel="icon" type="image/png" href="assets/images/Logo.png">

<style>
html { overflow-x: hidden; }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background: #0f2d4a;
    height: 100vh;
    width: 100vw;
}

/* fundal animat */
.wave {
    position: fixed;
    width: 200%; height: 200%;
    top: -50%; left: -50%;
    background: radial-gradient(circle at 20% 20%, #2d6494 0%, #0f2d4a 65%);
    animation: moveWave 12s infinite linear;
    opacity: 0.75;
    z-index: 0;
}

@keyframes moveWave {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(60px, 40px) scale(1.05); }
    100% { transform: translate(0,0) scale(1); }
}

/* bule */
.bubble {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25), rgba(0,198,255,0.05));
    border: 1px solid rgba(0,198,255,0.25);
    animation: floatUp linear infinite;
    z-index: 1;
}

@keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) scale(1.1); opacity: 0; }
}

.bubble:nth-child(1) { width: 18px; height: 18px; left: 5%; bottom: -20px; animation-duration: 8s; }
.bubble:nth-child(2) { width: 10px; height: 10px; left: 12%; bottom: -20px; animation-duration: 6s; }
.bubble:nth-child(3) { width: 22px; height: 22px; left: 20%; bottom: -20px; animation-duration: 10s; }
.bubble:nth-child(4) { width: 14px; height: 14px; right: 8%; bottom: -20px; animation-duration: 7s; }
.bubble:nth-child(5) { width: 20px; height: 20px; right: 18%; bottom: -20px; animation-duration: 9s; }
.bubble:nth-child(6) { width: 10px; height: 10px; right: 5%; bottom: -20px; animation-duration: 5s; }

/* note muzicale */
.note {
    position: fixed;
    font-size: 28px;
    animation: floatNote linear infinite;
    z-index: 1;
    opacity: 0;
    color: rgba(0,198,255,0.7);
    user-select: none;
}

@keyframes floatNote {
    0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.8; }
    50%  { transform: translateY(-40vh) rotate(15deg) scale(1); opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-90vh) rotate(-10deg) scale(0.9); opacity: 0; }
}

.note:nth-child(7)  { left: 7%;   bottom: 10%; animation-duration: 9s;  animation-delay: 0s;   font-size: 24px; }
.note:nth-child(8)  { left: 18%;  bottom: 20%; animation-duration: 12s; animation-delay: 2s;   font-size: 32px; }
.note:nth-child(9)  { left: 28%;  bottom: 5%;  animation-duration: 8s;  animation-delay: 4s;   font-size: 20px; }
.note:nth-child(10) { right: 7%;  bottom: 15%; animation-duration: 10s; animation-delay: 1s;   font-size: 28px; }
.note:nth-child(11) { right: 20%; bottom: 25%; animation-duration: 11s; animation-delay: 3s;   font-size: 22px; }
.note:nth-child(12) { right: 30%; bottom: 8%;  animation-duration: 7s;  animation-delay: 5s;   font-size: 30px; }
.note:nth-child(13) { left: 40%;  bottom: 3%;  animation-duration: 13s; animation-delay: 1.5s; font-size: 18px; }

/* navbar */
.navbar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 105px;
    display: flex;
    align-items: center;
    padding: 0 25px;
    z-index: 10;
    border-bottom: 1px solid rgba(0,198,255,0.2);
}

/* logo */
.logo {
    position: absolute;
    top: 5px; left: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 22px;
    font-weight: bold;
    text-decoration: none;
}

.logo img {
    width: 120px; height: 120px;
    object-fit: contain;
    margin: -15px -10px -15px -10px;
}

.logo span { color: #0099cc; margin-top: 10px; }

.nav-links {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
}

.nav-links a {
    text-decoration: none;
    color: rgba(255,255,255,0.75);
    padding: 8px 16px;
    border-radius: 30px;
    transition: 0.3s;
}

.nav-links a:hover {
    color: white;
    background: rgba(0,198,255,0.15);
}

.nav-links .active {
    color: #00c6ff;
    background: rgba(0,198,255,0.15);
}

/* dropdown cont */
.dropdown { position: relative; }

.dropdown .cont {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,198,255,0.3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
}

.dropdown .cont:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,198,255,0.5);
}

.nav-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.4);
}

.nav-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

.dropdown-menu {
    display: none;
    position: absolute;
    top: 110%; right: 0;
    background: rgba(15,45,74,0.97);
    border: 1.5px solid rgba(0,198,255,0.25);
    border-radius: 12px;
    overflow: hidden;
    min-width: 210px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index: 100;
}

.dropdown-menu.active { display: block; }

.dropdown-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dropdown-avatar {
    width: 35px; height: 35px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    flex-shrink: 0;
    overflow: hidden;
}

.dropdown-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

#dropUsername { font-size: 14px; font-weight: bold; color: white; }

.dropdown-menu a {
    display: block;
    padding: 13px 18px;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
    background: none;
}

.dropdown-menu a:hover { background: rgba(0,198,255,0.15); color: white; }

.dropdown-menu a.logout {
    color: #ff6b6b;
    border-top: 1px solid rgba(255,255,255,0.08);
}

.dropdown-menu a.logout:hover { background: rgba(255,80,80,0.15); }

/* container formular */
.container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 105px;
}

/* card formular */
.card {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(0,198,255,0.25);
    border-radius: 20px;
    padding: 35px 30px;
    width: 420px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,198,255,0.1);
    animation: fadeIn 0.8s ease forwards;
}

.card h2 { text-align: center; font-size: 24px; margin-bottom: 6px; }

.card .subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 25px;
}

/* campuri formular */
.form-group { display: flex; flex-direction: column; margin-bottom: 15px; }

.form-group label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    padding-left: 5px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 11px 18px;
    border-radius: 15px;
    border: 1.5px solid rgba(0,198,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 14px;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
    font-family: Arial, sans-serif;
    resize: none;
}

.form-group input::placeholder,
.form-group textarea::placeholder { color: rgba(255,255,255,0.3); }

.form-group input:focus,
.form-group textarea:focus {
    border-color: #00c6ff;
    background: rgba(0,198,255,0.08);
    box-shadow: 0 0 15px rgba(0,198,255,0.15);
}

.form-group textarea { height: 120px; }

/* buton trimitere */
.btn-send {
    width: 100%;
    padding: 13px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,198,255,0.4);
    margin-top: 5px;
}

.btn-send:hover { transform: scale(1.02); box-shadow: 0 6px 30px rgba(0,198,255,0.6); }
.btn-send:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* mesaje eroare / succes */
.msg {
    width: 100%; padding: 10px 16px;
    border-radius: 10px; font-size: 13px;
    text-align: center; margin-top: 12px;
    display: none;
}

.msg.success {
    background: rgba(0,255,150,0.1);
    border: 1px solid rgba(0,255,150,0.3);
    color: #00ff96; display: block;
}

.msg.error {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.4);
    color: #ff6b6b; display: block;
}

/* animatie intrare */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
}

    @media (max-width: 480px) {
        /* logo */
        .logo img { width: 70px !important; height: 70px !important; }
        .logo { font-size: 15px !important; }
        .logo span { margin-top: 5px !important; }

        /* navbar */
        .navbar { padding: 0 10px !important; height: 80px !important; }
        .nav-links { gap: 4px !important; }
        .nav-links a { padding: 6px 8px !important; font-size: 11px !important; }
        .dropdown .cont { padding: 6px 10px !important; font-size: 11px !important; }

        /* content */
        .content-wrap { top: 80px !important; height: calc(100vh - 80px) !important; }
        .page { padding: 20px 14px 60px !important; }

        /* titluri */
        h1, .page-title { font-size: 22px !important; }
        h2 { font-size: 18px !important; }

        body { overflow-y: auto; }
    }

    @media (max-width: 480px) {
        .card { width: calc(100vw - 30px) !important; padding: 20px 16px !important; }
        .container { padding-top: 90px !important; align-items: flex-start !important; }
    }


    /* hamburger */
    .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        padding: 8px;
        margin-left: auto;
        z-index: 9999;
        position: relative;
    }
    .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: white;
        border-radius: 2px;
        transition: 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-menu {
        display: none;
        position: fixed;
        top: 80px;
        left: 0;
        width: 100%;
        height: calc(100vh - 80px);
        background: rgba(10,25,45,0.98);
        z-index: 9999;
        flex-direction: column;
        padding: 10px 0;
        backdrop-filter: blur(10px);
        overflow-y: auto;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
        padding: 14px 24px;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-size: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: 0.2s;
    }
    .mobile-menu a:hover { background: rgba(0,198,255,0.1); color: white; }
    .mobile-menu a.logout-mob { color: #ff6b6b; }

    @media (max-width: 600px) {
        .nav-links { display: none !important; }
        .hamburger { display: flex !important; }
        .navbar { height: 80px !important; padding: 0 16px !important; }
        .logo { top: 12px !important; }
        .logo img { width: 60px !important; height: 60px !important; margin: -8px -8px -8px -8px !important; }
        .logo span { font-size: 14px !important; margin-top: 4px !important; }
    }


    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
        /* containerul devine scrollabil, altfel formularul se taie */
        .container {
            padding: 96px 14px 40px !important;
            align-items: flex-start !important;
            justify-content: center !important;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
        }
        .card { width: 100% !important; max-width: 420px !important; padding: 26px 20px !important; }
        .card h2 { font-size: 20px !important; }
        .card .subtitle { font-size: 12px !important; margin-bottom: 18px !important; }
    }
    @media (max-width: 380px) {
        .card { padding: 22px 16px !important; }
    }

</style>
</head>

<div class="note">♫</div>

<!-- navbar -->
<nav class="navbar">
    <a href="home.html" class="logo">
        <img src="assets/images/Logo.png" alt="logo">

    </a>
    <div class="nav-links">

<!-- formular contact -->
<div class="container">
    <div class="card">
        <h2>📩 Contact</h2>
        <div class="subtitle">Trimite-ne un mesaj și îți răspundem cât mai curând</div>

        <form id="contactForm">
            <!-- email preluat automat din cont -->
            <div class="form-group">
                <label>Email tău</label>
                <input type="email" id="fromEmail" readonly style="opacity:0.6; cursor:default;">
            </div>

            <div class="form-group">
                <label>Subiect</label>
                <input type="text" id="subject" placeholder="ex: Problemă la quiz..." required>
            </div>

            <div class="form-group">
                <label>Mesaj</label>
                <textarea id="message" placeholder="Scrie mesajul tău aici..." required></textarea>
            </div>

            <button type="submit" class="btn-send" id="btnSend">📩 Trimite mesajul</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // initializare firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBQe0VLbBbRi7l8AkDxx30jL0DfnJSlpeM",
        authDomain: "soundvera-66452.firebaseapp.com",
        projectId: "soundvera-66452",
        storageBucket: "soundvera-66452.firebasestorage.app",
        messagingSenderId: "255538443530",
        appId: "1:255538443530:web:018577a62aafddf45776f3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // verifica autentificarea si incarca emailul utilizatorului
    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = 'index.html'; return; }

        const savedPhoto = localStorage.getItem('avatar_' + user.uid);
        const letter = (user.displayName || '?')[0].toUpperCase();

        const navAvatar = document.getElementById('navAvatar');
        const dropAvatar = document.getElementById('dropAvatar');

        if (savedPhoto) {
            navAvatar.innerHTML = `<img src="${savedPhoto}" alt="avatar">`;
            dropAvatar.innerHTML = `<img src="${savedPhoto}" alt="avatar">`;
        } else {
            navAvatar.textContent = letter;
            dropAvatar.textContent = letter;
        }

        document.getElementById('dropUsername').textContent = user.displayName || 'N/A';
        // prefill email din cont
        document.getElementById('fromEmail').value = user.email;
    });

    // dropdown cont
    document.getElementById('contBtn').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('dropdownMenu').classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.dropdown')) {
            document.getElementById('dropdownMenu').classList.remove('active');
        }
    });

    // logout
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = 'index.html';
    });
    // logout din meniul mobil
    const logoutBtnMob = document.getElementById('logoutBtnMob');
    if (logoutBtnMob) logoutBtnMob.addEventListener('click', async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = 'index.html';
    });
</script>

<script>
    // initializare EmailJS
    emailjs.init('3EJa1uDcTd8qLBqV1');

    // trimitere formular contact
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnSend');
        const msg = document.getElementById('msg');
        btn.disabled = true;
        btn.textContent = 'Se trimite...';

        const params = {
            title:   document.getElementById('subject').value,
            name:    document.getElementById('dropUsername').textContent,
            message: document.getElementById('message').value,
            email:   document.getElementById('fromEmail').value
        };

        // trimite mesajul + confirmare automata prin EmailJS
        emailjs.send('service_n9svxqd', 'template_ubcgv8g', params)
            .then(() => {
                msg.textContent = '✅ Mesaj trimis cu succes!';
                msg.className = 'msg success';
                document.getElementById('contactForm').reset();
                document.getElementById('fromEmail').value = params.email;
                btn.disabled = false;
                btn.textContent = '📩 Trimite mesajul';
            })
            .catch(() => {
                msg.textContent = '❌ Eroare la trimitere. Încearcă din nou!';
                msg.className = 'msg error';
                btn.disabled = false;
                btn.textContent = '📩 Trimite mesajul';
            });
    });
</script>

<script>
// ===== MENIU HAMBURGER =====
function toggleMobileMenu() {
    document.getElementById('hamburger').classList.toggle('open');
    document.getElementById('mobileMenu').classList.toggle('open');
}
window.toggleMobileMenu = toggleMobileMenu;

// inchide la click in afara
document.addEventListener('click', function(e) {
    if (!e.target.closest('#hamburger') && !e.target.closest('#mobileMenu')) {
        var h = document.getElementById('hamburger');
        var m = document.getElementById('mobileMenu');
        if (h) h.classList.remove('open');
        if (m) m.classList.remove('open');
    }
});

// inchide cand apesi pe un link
document.querySelectorAll('#mobileMenu a').forEach(function(a) {
    a.addEventListener('click', function() {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('mobileMenu').classList.remove('open');
    });
});

// inchide daca revii pe desktop
window.addEventListener('resize', function() {
    if (window.innerWidth > 600) {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('mobileMenu').classList.remove('open');
    }
});
</script>
